CONFIG_PRINTK=y
CONFIG_GPIO=y

# General
CONFIG_ASSERT=y

# Modem library
# In NCS v3.x this is default y for nRF91 targets, but keeping it explicit
# here ensures the build works correctly on both v2.x and v3.x.
CONFIG_NRF_MODEM_LIB=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Stacks and heaps
# Increase main stack slightly to accommodate AT response parsing
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_AT_MONITOR_HEAP_SIZE=512

# Enable Zephyr application to be booted by MCUboot
CONFIG_BOOTLOADER_MCUBOOT=y
