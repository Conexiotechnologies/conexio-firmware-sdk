sample:
  name: Digital Read/Write GPIO

common:
  tags: gpio
  depends_on: gpio

tests:
  samples.digital_read_write:
    platform_allow: conexio_stratus_pro_nrf9151_ns
    harness: console
    harness_config:
      type: multi_line
      ordered: true
      regex:
        - "Digital read/write sample"
        - "Output pin.*configured"
        - "Input pin.*configured"
