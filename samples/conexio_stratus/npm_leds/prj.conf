CONFIG_LOG=y
CONFIG_PRINTK=y

# GPIO and I2C support
CONFIG_GPIO=y
CONFIG_I2C=y

# MFD and regulator support required by nPM1300
CONFIG_MFD=y
CONFIG_REGULATOR=y

# LED driver - auto-enabled via DT, but explicit for clarity
CONFIG_LED=y
CONFIG_LED_NPM13XX=y

CONFIG_MAIN_STACK_SIZE=1536

# Enable MCUboot bootloader support
CONFIG_BOOTLOADER_MCUBOOT=y
